<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cc-wechat</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #333333;
      --gray: #888888;
      --accent: #07c160; /* 微信绿 */
      --border: #eeeeee;
      --log-bg: #1e1e1e;
      --log-text: #d4d4d4;
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --text: #eeeeee;
        --border: #333333;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      user-select: none;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    /* 顶部拖拽区 */
    .titlebar {
      height: 40px;
      -webkit-app-region: drag; /* 允许拖拽窗口 */
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background-color: rgba(255, 255, 255, 0.05);
    }

    .titlebar .title {
      font-weight: 600;
      font-size: 14px;
    }

    .titlebar .controls {
      -webkit-app-region: no-drag;
      cursor: pointer;
      color: var(--gray);
    }
    .titlebar .controls:hover {
      color: var(--text);
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    /* 二维码区域 */
    .qr-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
    }

    .qr-image {
      width: 200px;
      height: 200px;
      background-color: #f0f0f0;
      border-radius: 8px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 10px;
      background: white; /* 二维码需要白色背景 */
    }

    .qr-image img {
      max-width: 100%;
      max-height: 100%;
    }

    .status-text {
      font-size: 14px;
      color: var(--gray);
      margin-bottom: 20px;
    }

    /* 日志控制台 */
    .logs {
      height: 150px;
      background-color: var(--log-bg);
      color: var(--log-text);
      border-radius: 6px;
      padding: 10px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px;
      overflow-y: auto;
      user-select: text;
    }

    .log-line {
      margin-bottom: 4px;
      word-break: break-all;
    }
    
    .hidden {
      display: none !important;
    }
    
    /* 运行状态 */
    .running-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
    }
    
    .running-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    /* 设置面板 */
    .settings-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .form-group input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }
    .form-checkbox {
      display: flex;
      align-items: center;
      font-size: 13px;
      cursor: pointer;
    }
    .form-checkbox input {
      margin-right: 8px;
    }
    .form-section {
      padding-top: 4px;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: bold;
      color: var(--gray);
    }
    .form-help {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.4;
      color: var(--gray);
    }
    .btn {
      padding: 8px 16px;
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 10px;
    }
    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="title">cc-wechat</div>
    <div class="controls">
      <span id="settings-btn" style="margin-right: 12px;" title="设置">⚙️</span>
      <span id="close-btn" title="隐藏">✖</span>
    </div>
  </div>

  <div class="container">
    <!-- 等待扫码界面 -->
    <div class="qr-container" id="panel-qr">
      <div class="qr-image" id="qr-box">
        <span style="color:#aaa;">加载中...</span>
      </div>
      <div class="status-text" id="qr-status">正在获取登录二维码</div>
    </div>
    
    <!-- 运行中界面 -->
    <div class="running-state hidden" id="panel-running">
      <div class="running-icon">🟢</div>
      <div class="status-text">服务已启动并连接微信</div>
    </div>

    <!-- 底部日志区 -->
    <div class="logs" id="logs-container">
      <div class="log-line">准备就绪...</div>
    </div>
    
    <!-- 设置面板 -->
    <div class="settings-panel hidden" id="panel-settings">
      <div class="form-group">
        <label>Claude 目录 (逗号分隔)</label>
        <input type="text" id="cfg-claudeDirs" placeholder="C:\Users\xxx\.claude" />
      </div>
      <div class="form-group">
        <label class="form-checkbox">
          <input type="checkbox" id="cfg-lockScreenMode" />
          仅锁屏生效模式 (推送通知)
        </label>
      </div>
      <div class="form-group">
        <label class="form-checkbox">
          <input type="checkbox" id="cfg-autoStart" />
          开机自启
        </label>
      </div>
      <div class="form-section">自定义</div>
      <div class="form-group">
        <label>机器人别名 (Bot Alias)</label>
        <input type="text" id="cfg-botAlias" placeholder="Claude" />
      </div>
      <div class="form-group">
        <label>新标签页启动命令</label>
        <input type="text" id="cfg-terminalCommand" placeholder="claude" />
      </div>
      <div class="form-section">能力</div>
      <div class="form-group">
        <label class="form-checkbox">
          <input type="checkbox" id="cfg-capability-sendFile" />
          注入发送文件能力
        </label>
        <div class="form-help">普通微信文本会按需附加精简上下文，让 Claude 知道可用 send-cc-wechat-files 申请发送文件。</div>
      </div>
      <button class="btn" id="save-settings-btn">保存配置</button>
      <button class="btn" id="logout-btn" style="background-color: #ff4d4f; margin-top: 20px;">解除当前微信绑定</button>
    </div>
  </div>

  <script>
    const closeBtn = document.getElementById('close-btn');
    const settingsBtn = document.getElementById('settings-btn');
    const qrBox = document.getElementById('qr-box');
    const qrStatus = document.getElementById('qr-status');
    const logsContainer = document.getElementById('logs-container');
    const panelQr = document.getElementById('panel-qr');
    const panelRunning = document.getElementById('panel-running');
    const panelSettings = document.getElementById('panel-settings');

    let isSettingsOpen = false;
    let currentConfig = {};
    let mainPanelObj = panelQr; // 记录是从二维码还是运行状态切过去的

    closeBtn.addEventListener('click', () => {
      window.electronAPI.closeWindow();
    });

    // 退出登录
    document.getElementById('logout-btn').addEventListener('click', async () => {
      const confirmMsg = "【解绑提示】\n一个微信只能绑定一个助手，一个助手也只能被一个微信绑定。\n解绑后当前微信将无法再下发指令，您可以重新扫码绑定新的微信。\n\n确认要解除绑定吗？";
      if (confirm(confirmMsg)) {
        await window.electronAPI.clearToken();
      }
    });

    settingsBtn.addEventListener('click', async () => {
      isSettingsOpen = !isSettingsOpen;
      if (isSettingsOpen) {
        // 隐藏主视图，显示设置
        if (!panelQr.classList.contains('hidden')) mainPanelObj = panelQr;
        else if (!panelRunning.classList.contains('hidden')) mainPanelObj = panelRunning;
        
        mainPanelObj.classList.add('hidden');
        logsContainer.classList.add('hidden');
        panelSettings.classList.remove('hidden');

        // 加载配置
        const config = await window.electronAPI.getConfig();
        currentConfig = config || {};
        const autoStart = await window.electronAPI.getAutoStart();
        
        document.getElementById('cfg-claudeDirs').value = (config.claudeDirs || []).join(',');
        document.getElementById('cfg-lockScreenMode').checked = config.lockScreenMode?.enabled || false;
        document.getElementById('cfg-autoStart').checked = autoStart;
        document.getElementById('cfg-botAlias').value = config.botAlias || 'Claude';
        document.getElementById('cfg-terminalCommand').value = config.terminalCommand || 'claude';
        document.getElementById('cfg-capability-sendFile').checked = config.capabilityInjection?.capabilities?.sendFile || false;
      } else {
        // 返回主视图
        panelSettings.classList.add('hidden');
        mainPanelObj.classList.remove('hidden');
        logsContainer.classList.remove('hidden');
      }
    });

    document.getElementById('save-settings-btn').addEventListener('click', async () => {
      const dirsInput = document.getElementById('cfg-claudeDirs').value;
      const dirs = dirsInput.split(',').map(s => s.trim().replace(/\\/g, '/')).filter(Boolean);
      const lockScreenEnabled = document.getElementById('cfg-lockScreenMode').checked;
      const autoStart = document.getElementById('cfg-autoStart').checked;
      const botAlias = document.getElementById('cfg-botAlias').value.trim() || 'Claude';
      const terminalCommand = document.getElementById('cfg-terminalCommand').value.trim() || 'claude';
      const sendFileCapability = document.getElementById('cfg-capability-sendFile').checked;
      const capabilityInjection = currentConfig.capabilityInjection || {};

      await window.electronAPI.saveConfig({
        claudeDirs: dirs,
        botAlias,
        terminalCommand,
        lockScreenMode: { enabled: lockScreenEnabled, idleGraceSeconds: 5 },
        capabilityInjection: {
          ...capabilityInjection,
          capabilities: {
            ...(capabilityInjection.capabilities || {}),
            sendFile: sendFileCapability,
          },
        },
      });
      await window.electronAPI.setAutoStart(autoStart);
      
      settingsBtn.click(); // 关闭面板
      appendLog('✅ 配置已保存');
    });

    const MAX_LOG_LINES = 500;
    function appendLog(text) {
      const el = document.createElement('div');
      el.className = 'log-line';
      el.textContent = text;
      logsContainer.appendChild(el);
      while (logsContainer.childElementCount > MAX_LOG_LINES) {
        logsContainer.removeChild(logsContainer.firstElementChild);
      }
      logsContainer.scrollTop = logsContainer.scrollHeight;
    }

    // 监听主进程发来的二维码
    window.electronAPI.onQrcode((qr) => {
      if (qr.local_base64) {
        // 使用主进程生成的本地 base64 图像
        qrBox.innerHTML = `<img src="${qr.local_base64}" alt="QR Code" />`;
      } else if (qr.qrcode_img_content && !qr.qrcode_img_content.startsWith('http')) {
        // 使用接口自带的 base64
        qrBox.innerHTML = `<img src="data:image/jpeg;base64,${qr.qrcode_img_content}" alt="QR Code" />`;
      } else {
        const qrUrl = qr.url || qr.qrcode_url || qr.qrcode_img_url;
        if (qrUrl) {
          // 兜底方案
          const imgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrUrl)}`;
          qrBox.innerHTML = `<img src="${imgUrl}" alt="QR Code" />`;
        }
      }
      qrStatus.textContent = '请使用微信扫码登录';
    });

    // 监听状态
    window.electronAPI.onStatus((status) => {
      if (status.status === 'confirmed') {
        qrStatus.textContent = '扫码成功，正在登录...';
      } else if (status.status === 'expired') {
        qrStatus.textContent = '二维码已过期，请重启应用';
      }
    });

    // 监听登录成功
    window.electronAPI.onLoginSuccess(() => {
      panelQr.classList.add('hidden');
      panelRunning.classList.remove('hidden');
      appendLog('✅ 微信登录成功，服务已就绪。');
    });

    // 监听日志
    window.electronAPI.onLog((logText) => {
      appendLog(logText);
    });
    
    window.electronAPI.onError((errText) => {
      appendLog('❌ 错误: ' + errText);
    });
  </script>
</body>
</html>
